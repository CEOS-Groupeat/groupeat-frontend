name: Groupet PR Pipeline (CI & Vercel Preview)

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened] # PR이 열리거나 코드가 추가 푸시될 때 실행

jobs:
  # 1단계: 프론트엔드 코드 품질 검사 (CI)
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 # 현재 사용 중인 pnpm 버전에 맞춰 수정 가능

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 현재 사용 중인 Node 버전에 맞춰 수정
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Linting
        run: pnpm lint

      - name: Type Checking
        run: pnpm tsc --noEmit

      - name: Test Build
        run: pnpm build
        env:
          # 빌드 시 필요한 환경 변수가 있다면 GitHub Secrets에서 가져옵니다.
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # 2단계: Vercel 프리뷰 배포 (CD) - CI 통과 시에만 실행
  vercel-preview-deploy:
    needs: ci-pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Vercel CLI
        run: pnpm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel Preview
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}